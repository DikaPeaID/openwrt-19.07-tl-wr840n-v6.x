name: Build
on:
  workflow_dispatch: # This allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-22.04 # Required for older OpenWrt 19.07 toolchains

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential ccache ecj fastjar file g++ gawk \
        gettext git java-propose-classpath libelf-dev libncurses5-dev \
        libncursesw5-dev libssl-dev python2 python3 python3-distutils python3-setuptools \
        python3-dev rsync subversion swig time xsltproc zlib1g-dev unzip
        
        # Map the default 'python' command to python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Update and Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure the Firmware Build
      run: |
        # 1. Set the target router architecture
        echo "CONFIG_TARGET_ramips=y" > .config
        echo "CONFIG_TARGET_ramips_mt76x8=y" >> .config
        echo "CONFIG_TARGET_ramips_mt76x8_DEVICE_tl-wr840n-v6=y" >> .config
        
        # 2. Add WireGuard Packages
        echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
        echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
        
        # 3. Explicitly Include the Web Interface (LuCI)
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_uhttpd=y" >> .config
        
        # Expand these basic settings into a full OpenWrt configuration
        make defconfig

    - name: Download Required Packages
      run: make download -j8

    - name: Compile Firmware (This will take a while)
      run: make -j$(nproc)

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: wr840n-wireguard-firmware
        path: bin/targets/ramips/mt76x8/*sysupgrade.bin
